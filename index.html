<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mighty AI</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #13131a;
            --accent-primary: #7b2cbf;
            --accent-secondary: #9d4edd;
            --text-main: #f8f9fa;
            --text-muted: #94a3b8;
            --user-bubble: #241442;
            --ai-bubble: #1e1e24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0a0c 100%);
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 600px;
            background: rgba(19, 19, 26, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 600px) {
            .app-container {
                border-radius: 24px;
                height: 85vh;
                height: 85dvh;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(123, 44, 191, 0.15);
            }
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(123, 44, 191, 0.05) 0%, transparent 100%);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #e0aaff, #9d4edd, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(15px);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .user-message {
            background-color: var(--user-bubble);
            color: #f3e8ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(157, 77, 221, 0.2);
        }

        .ai-message {
            background-color: var(--ai-bubble);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .input-footer {
            padding: 16px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 12, 0.8);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #181822;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 6px 6px 14px;
            transition: all 0.3s ease;
            gap: 8px;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(157, 77, 221, 0.25);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: #555e70;
        }

        /* Voice Control Buttons */
        .action-btn {
            background: none;
            border: none;
            outline: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .mic-btn {
            fill: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03);
        }

        .mic-btn.listening {
            background: #ef4444;
            fill: white;
            border-color: #ef4444;
            animation: pulseRecord 1.5s infinite;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            fill: white;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: slideIn 0.2s ease forwards;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            100% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Mighty AI</h1>
    </header>

    <div class="chat-window" id="chatWindow">
        <div class="message ai-message">
            Hey! I'm Mighty AI. What are we building or working on today?
        </div>
    </div>

    <div class="input-footer">
        <div class="input-wrapper">
            <button class="action-btn mic-btn" id="micBtn" onclick="toggleVoiceInput()" title="Speak">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"></path>
                </svg>
            </button>
            
            <input type="text" id="userInput" placeholder="Message Mighty AI..." autocomplete="off">
            
            <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://mightyai.landonsloat70-62c.workers.dev/";

    const chatWindow = document.getElementById("chatWindow");
    const userInput = document.getElementById("userInput");
    const micBtn = document.getElementById("micBtn");

    let recognition = null;
    let isListening = false;

    // Initialize Web Speech API safely for cross-platform (Chrome & iOS Safari)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false; // Stops recording automatically when user stops talking
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add("listening");
            userInput.placeholder = "Listening...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
        };

        recognition.onerror = (e) => {
            console.error("Speech Recognition Error: ", e);
            stopListeningState();
        };

        recognition.onend = () => {
            stopListeningState();
            // Automatically fire the message if something was captured via voice
            if (userInput.value.trim() !== "") {
                sendMessage();
            }
        };
    } else {
        micBtn.style.display = "none"; // Hide if engine completely unsupported
    }

    function toggleVoiceInput() {
        if (!recognition) return;
        // Instantly shut off speech synthesis if user interrupts by pressing mic
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();

        if (!isListening) {
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    function stopListeningState() {
        isListening = false;
        micBtn.classList.remove("listening");
        userInput.placeholder = "Message Mighty AI...";
    }

    // Text-To-Speech function
    function speakOutLoud(text) {
        if ('speechSynthesis' in window) {
            // Cancel any old speaking instances
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Optimization for clean native system accents on iPhones
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(voice => voice.lang.includes('en-US') && voice.name.includes('Samantha'));
            if (preferredVoice) utterance.voice = preferredVoice;

            window.speechSynthesis.speak(utterance);
        }
    }

    // Keyboard Event Handler
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendMessage(query, "user-message");
        userInput.value = "";

        // Interrupt speech if the user types/sends a fresh message
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();

        const loader = showTypingIndicator();

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: query })
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            loader.remove();
            
            appendMessage(data.text, "ai-message");
            
            // Speak response back natively
            speakOutLoud(data.text);

        } catch (error) {
            loader.remove();
            const errText = "Mighty AI service is temporarily unavailable. Please try again later.";
            appendMessage(errText, "ai-message");
            speakOutLoud(errText);
        }
    }

    function appendMessage(text, className) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${className}`;
        messageDiv.innerText = text;
        chatWindow.appendChild(messageDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = `
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        `;
        chatWindow.appendChild(indicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return indicator;
    }

    // Warm-up voice engine for iOS Safari on layout initialization
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mighty AI</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #13131a;
            --accent-primary: #7b2cbf;
            --accent-secondary: #9d4edd;
            --text-main: #f8f9fa;
            --text-muted: #94a3b8;
            --user-bubble: #241442;
            --ai-bubble: #1e1e24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0a0c 100%);
        }

        /* Main App Container */
        .app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 600px;
            background: rgba(19, 19, 26, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 600px) {
            .app-container {
                border-radius: 24px;
                height: 90vh;
                height: 90dvh;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(123, 44, 191, 0.15);
            }
        }

        /* Top Bar Header */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(123, 44, 191, 0.1) 0%, transparent 100%);
            z-index: 10;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #e0aaff, #9d4edd, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Live Mode Button */
        .live-toggle-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(157, 77, 221, 0.3);
            transition: transform 0.2s ease;
        }

        /* Settings Gear Button */
        .settings-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            fill: var(--text-main);
            transition: background 0.2s ease;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Settings Overlay Modal Panel */
        .settings-modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 30px 24px;
            animation: fadeIn 0.2s ease;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .settings-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .close-settings-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .setting-row label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Styled Select Box */
        .setting-row select {
            background: #181822;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }

        /* VIEW 1: Chat Layout */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        .user-message {
            background-color: var(--user-bubble);
            color: #f3e8ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(157, 77, 221, 0.2);
        }

        .ai-message {
            background-color: var(--ai-bubble);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .input-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 12, 0.5);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #181822;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(157, 77, 221, 0.25);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: #555e70;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            outline: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
            margin-left: 2px;
        }

        /* VIEW 2: Immersive Live Voice View */
        .live-voice-view {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #16072b 0%, #050507 100%);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 24px;
            animation: fadeIn 0.4s ease;
        }

        .live-status {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            margin-top: 20px;
        }

        .orb-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .voice-orb {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #7b2cbf, #b76eff, #e0aaff);
            border-radius: 50%;
            filter: drop-shadow(0 0 30px rgba(157, 77, 221, 0.5));
            transition: all 0.5s ease-in-out;
            transform-origin: center;
        }

        .voice-orb.listening {
            animation: morphListening 4s infinite linear alternate, pulseListening 2s infinite ease-in-out;
        }

        .voice-orb.thinking {
            scale: 0.9;
            animation: morphThinking 1.2s infinite linear;
            background: linear-gradient(45deg, #4a157d, #7b2cbf, #9d4edd);
        }

        .voice-orb.speaking {
            animation: morphSpeaking 2s infinite linear alternate, pulseSpeaking 0.6s infinite ease-in-out alternate;
            scale: 1.15;
        }

        .voice-subtitles {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-main);
            text-align: center;
            max-width: 90%;
            min-height: 60px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .end-voice-btn {
            background: #ffffff;
            border: none;
            color: #000000;
            padding: 14px 36px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: var(--ai-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: slideIn 0.3s ease forwards;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mighty AI</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #13131a;
            --accent-primary: #7b2cbf;
            --accent-secondary: #9d4edd;
            --text-main: #f8f9fa;
            --text-muted: #94a3b8;
            --user-bubble: #241442;
            --ai-bubble: #1e1e24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0a0c 100%);
        }

        /* Main App Container */
        .app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 600px;
            background: rgba(19, 19, 26, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 600px) {
            .app-container {
                border-radius: 24px;
                height: 90vh;
                height: 90dvh;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(123, 44, 191, 0.15);
            }
        }

        /* Top Bar Header */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(123, 44, 191, 0.1) 0%, transparent 100%);
            z-index: 10;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #e0aaff, #9d4edd, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Live Mode Button */
        .live-toggle-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(157, 77, 221, 0.3);
            transition: transform 0.2s ease;
        }

        /* Settings Gear Button */
        .settings-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            fill: var(--text-main);
            transition: background 0.2s ease;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Settings Overlay Modal Panel */
        .settings-modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 30px 24px;
            animation: fadeIn 0.2s ease;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .settings-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .close-settings-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .setting-row label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Premium Styled Select Box and Text Input */
        .setting-row select, .setting-row input[type="text"] {
            background: #181822;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .setting-row input[type="text"]:focus {
            border-color: var(--accent-secondary);
        }

        /* VIEW 1: Traditional Premium Chat Layout */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        .user-message {
            background-color: var(--user-bubble);
            color: #f3e8ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(157, 77, 221, 0.2);
        }

        .ai-message {
            background-color: var(--ai-bubble);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .input-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 12, 0.5);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #181822;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(157, 77, 221, 0.25);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 10px 0;
        }

        .input-wrapper input::placeholder {
            color: #555e70;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            outline: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
            margin-left: 2px;
        }

        /* VIEW 2: Immersive Voice Mode Screen */
        .live-voice-view {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #16072b 0%, #050507 100%);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 24px;
            animation: fadeIn 0.4s ease;
        }

        .live-status {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            margin-top: 20px;
        }

        .orb-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* FIXED STABLE BASE ORB WITH SMOOTH TRANSITION SPEED MATRICES */
        .voice-orb {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #7b2cbf, #b76eff, #e0aaff);
            border-radius: 50%;
            filter: drop-shadow(0 0 30px rgba(157, 77, 221, 0.5));
            transform: scale(1);
            transform-origin: center;
            /* Handles sizing and glow shifts flawlessly without skipping frames */
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        filter 0.6s ease, 
                        background 0.6s ease;
        }

        /* Distinct states manipulate shape changes smoothly without jumping scales */
        .voice-orb.listening {
            animation: morphListening 5s infinite linear alternate;
            transform: scale(1);
            filter: drop-shadow(0 0 35px rgba(157, 77, 221, 0.6));
        }

        .voice-orb.thinking {
            animation: morphThinking 1.8s infinite linear;
            transform: scale(0.88);
            filter: drop-shadow(0 0 25px rgba(224, 170, 255, 0.4));
            background: linear-gradient(45deg, #4a157d, #7b2cbf, #9d4edd);
        }

        .voice-orb.speaking {
            animation: morphSpeaking 2s infinite linear alternate;
            transform: scale(1.18);
            filter: drop-shadow(0 0 50px rgba(183, 110, 255, 0.8));
        }

        .voice-subtitles {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-main);
            text-align: center;
            max-width: 90%;
            min-height: 60px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .end-voice-btn {
            background: #ffffff;
            border: none;
            color: #000000;
            padding: 14px 36px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: var(--ai-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: slideIn 0.3s ease forwards;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Unified Fluid Morph Layouts */
        @keyframes morphListening {
            0% { border-radius: 48% 52% 50% 50% / 50% 50% 50% 50%; }
            100% { border-radius: 52% 48% 51% 49% / 49% 51% 48% 52%; }
        }
        @keyframes morphThinking {
            0% { transform: scale(0.88) rotate(0deg); border-radius: 42% 58% 45% 55% / 45% 55% 42% 58%; }
            100% { transform: scale(0.88) rotate(360deg); border-radius: 58% 42% 55% 45% / 55% 42% 58% 45%; }
        }
        @keyframes morphSpeaking {
            0% { border-radius: 35% 65% 42% 58% / 55% 38% 62% 45%; }
            100% { border-radius: 62% 38% 58% 42% / 42% 58% 38% 62%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <h1>Mighty AI</h1>
        <div class="header-actions">
            <button class="live-toggle-btn" onclick="startLiveVoiceSession()">
                <span>🎙️</span> Live Session
            </button>
            <button class="settings-btn" onclick="toggleSettings(true)" title="Settings">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-settings-btn" onclick="toggleSettings(false)">✕</button>
        </div>
        
        <div class="setting-row">
            <label for="personalitySelect">AI Personality</label>
            <select id="personalitySelect" onchange="handlePersonalityChange()">
                <option value="standard">Standard (Default Balanced)</option>
                <option value="professional">Professional (Smart & Technical)</option>
                <option value="sarcastic">Sarcastic (Funny & Witty)</option>
                <option value="supportive">Supportive (Kind & Encouraging)</option>
                <option value="custom">Custom (Write your own...)</option>
            </select>
        </div>

        <div class="setting-row" id="customPersonalityRow" style="display: none;">
            <label for="customPersonalityInput">Custom Instructions</label>
            <input type="text" id="customPersonalityInput" placeholder="e.g., Talk like a 1920s pirate detective...">
        </div>
    </div>

    <div class="chat-view" id="chatView">
        <div class="chat-window" id="chatWindow">
            <div class="message ai-message">
                Hey! I'm Mighty AI. What are we building or working on today?
            </div>
        </div>

        <div class="input-footer">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message Mighty AI..." autocomplete="off">
                <button class="send-btn" onclick="sendTextMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="live-voice-view" id="liveVoiceView">
        <div class="live-status" id="voiceStatus">Connecting...</div>
        <div class="orb-container">
            <div class="voice-orb listening" id="voiceOrb"></div>
        </div>
        <div class="voice-subtitles" id="voiceSubtitles">Tap the button below to start talking...</div>
        <button class="end-voice-btn" onclick="endLiveVoiceSession()">End Session</button>
    </div>

</div>

<script>
    const WORKER_URL = "https://mightyai.landonsloat70-62c.workers.dev/";

    const chatView = document.getElementById("chatView");
    const liveVoiceView = document.getElementById("liveVoiceView");
    const settingsModal = document.getElementById("settingsModal");
    const chatWindow = document.getElementById("chatWindow");
    const userInput = document.getElementById("userInput");
    const personalitySelect = document.getElementById("personalitySelect");
    const customPersonalityRow = document.getElementById("customPersonalityRow");
    const customPersonalityInput = document.getElementById("customPersonalityInput");
    
    const voiceStatus = document.getElementById("voiceStatus");
    const voiceOrb = document.getElementById("voiceOrb");
    const voiceSubtitles = document.getElementById("voiceSubtitles");

    let voiceSessionActive = false;
    let recognition = null;
    let currentUtterance = null;

    function toggleSettings(show) {
        settingsModal.style.display = show ? "flex" : "none";
    }

    // Handles expanding/collapsing custom personality row
    function handlePersonalityChange() {
        if (personalitySelect.value === "custom") {
            customPersonalityRow.style.display = "flex";
            customPersonalityInput.focus();
        } else {
            customPersonalityRow.style.display = "none";
        }
    }

    // Dynamic Context Builder
    function getContextualModifier() {
        const personality = personalitySelect.value;
        if (personality === "professional") {
            return "[System Persona: Be highly professional, technical, clear, and direct. Avoid casual chatter.] ";
        } else if (personality === "sarcastic") {
            return "[System Persona: Be witty, slightly sarcastic, funny, and highly conversational.] ";
        } else if (personality === "supportive") {
            return "[System Persona: Be deeply encouraging, kind, empathetic, and exceptionally supportive.] ";
        } else if (personality === "custom") {
            const customValue = customPersonalityInput.value.trim();
            return customValue ? `[System Persona: ${customValue}] ` : "";
        }
        return "";
    }

    // Web Speech Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            if (!voiceSessionActive) return;
            setOrbState("listening");
            voiceStatus.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            if (!voiceSessionActive) return;
            const transcript = event.results[0][0].transcript;
            voiceSubtitles.innerText = `You: "${transcript}"`;
            await processVoiceInput(transcript);
        };

        recognition.onerror = () => {
            if (voiceSessionActive) setTimeout(() => { startListeningLoop(); }, 400);
        };

        recognition.onend = () => {
            if (voiceSessionActive && !voiceOrb.classList.contains("thinking") && !voiceOrb.classList.contains("speaking")) {
                startListeningLoop();
            }
        };
    }

    // FIXED CLASS HANDLING - Removes classes without stripping base setup to ensure fluid transitions
    function setOrbState(state) {
        voiceOrb.classList.remove("listening", "thinking", "speaking");
        if (state) voiceOrb.classList.add(state);
    }

    function startLiveVoiceSession() {
        if (!SpeechRecognition) {
            alert("Your browser/device context doesn't support system speech frameworks.");
            return;
        }
        voiceSessionActive = true;
        liveVoiceView.style.display = "flex";
        voiceSubtitles.innerText = "Say something to Mighty AI...";
        startListeningLoop();
    }

    function startListeningLoop() {
        try {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            recognition.start();
        } catch(e) {}
    }

    function endLiveVoiceSession() {
        voiceSessionActive = false;
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        liveVoiceView.style.display = "none";
        setOrbState("listening");
    }

    async function processVoiceInput(text) {
        setOrbState("thinking");
        voiceStatus.innerText = "Thinking...";

        const payloadMessage = getContextualModifier() + text;

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: payloadMessage })
            });
            if (!response.ok) throw new Error();
            const data = await response.json();
            if (!voiceSessionActive) return;
            speakVoiceResponse(data.text);
        } catch (error) {
            if (!voiceSessionActive) return;
            speakVoiceResponse("Mighty AI service is temporarily unavailable. Please try again later.");
        }
    }

    function speakVoiceResponse(aiResponseText) {
        if (!('speechSynthesis' in window)) {
            voiceSubtitles.innerText = aiResponseText;
            setOrbState("listening");
            return;
        }

        setOrbState("speaking");
        voiceStatus.innerText = "Speaking...";
        voiceSubtitles.innerText = aiResponseText;

        currentUtterance = new SpeechSynthesisUtterance(aiResponseText);
        const voices = window.speechSynthesis.getVoices();
        const activeVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Samantha'));
        if (activeVoice) currentUtterance.voice = activeVoice;

        currentUtterance.onend = () => { if (voiceSessionActive) startListeningLoop(); };
        currentUtterance.onerror = () => { if (voiceSessionActive) startListeningLoop(); };

        window.speechSynthesis.speak(currentUtterance);
    }

    /* Text Handling */
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendTextMessage(); });

    async function sendTextMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendChatMessage(query, "user-message");
        userInput.value = "";

        const loader = showTypingIndicator();
        const payloadMessage = getContextualModifier() + query;

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: payloadMessage })
            });
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            loader.remove();
            appendChatMessage(data.text, "ai-message");
        } catch (error) {
            loader.remove();
            appendChatMessage("Mighty AI service is temporarily unavailable. Please try again later.", "ai-message");
        }
    }

    function appendChatMessage(text, className) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${className}`;
        messageDiv.innerText = text;
        chatWindow.appendChild(messageDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTypingIndicator() {
        const indicator = document.createElement("div");
        indicator.className = "typing-indicator";
        indicator.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
        chatWindow.appendChild(indicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return indicator;
    }

    if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
</script>

</body>
</html>

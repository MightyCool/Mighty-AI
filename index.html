<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mighty AI</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --input-bg: #212121;
            --text-main: #ececec;
            --text-muted: #b4b4b4;
            --accent-green: #10a37f;
            --mic-active: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* Full Screen Center Area matching ChatGPT constraints */
        .app-container {
            width: 100vw;
            max-width: 768px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0 16px;
        }

        /* Top sticky header */
        header {
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Chat window showing clean stacked rows instead of flashy boxes */
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 28px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Minimal Row Layout like ChatGPT */
        .message-row {
            display: flex;
            flex-direction: column;
            width: 100%;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInRow 0.3s ease-out forwards;
        }

        .message-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .user-row .message-label {
            color: #ffffff;
            align-self: flex-start;
        }

        .ai-row .message-label {
            color: var(--text-muted);
            align-self: flex-start;
        }

        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        /* Pill Bottom Action Container */
        .input-footer {
            padding: 16px 0;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            background: linear-gradient(180deg, transparent 0%, var(--bg-color) 30%);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 8px 12px 8px 18px;
            gap: 10px;
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 16px;
            padding: 8px 0;
        }

        .input-wrapper input::placeholder {
            color: #7f7f7f;
        }

        /* Action Icons embedded seamlessly */
        .action-btn {
            background: none;
            border: none;
            outline: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .mic-btn {
            fill: var(--text-muted);
        }

        .mic-btn:hover {
            fill: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .mic-btn.listening {
            background: var(--mic-active);
            fill: #ffffff;
            animation: pulseRecord 1.5s infinite;
        }

        .send-btn {
            background: #ffffff;
            fill: var(--bg-color);
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Streamlined Typing Loader */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0;
            align-self: flex-start;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeInRow { to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Mighty AI</h1>
    </header>

    <div class="chat-window" id="chatWindow">
        <div class="message-row ai-row">
            <div class="message-label">Mighty AI</div>
            <div class="message-content">Hey! I'm Mighty AI. What are we building or working on today?</div>
        </div>
    </div>

    <div class="input-footer">
        <div class="input-wrapper">
            <button class="action-btn mic-btn" id="micBtn" onclick="toggleVoiceInput()" title="Speak">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"></path>
                </svg>
            </button>
            
            <input type="text" id="userInput" placeholder="Message Mighty AI..." autocomplete="off">
            
            <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="16" height="16">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://mightyai.landonsloat70-62c.workers.dev/";

    const chatWindow = document.getElementById("chatWindow");
    const userInput = document.getElementById("userInput");
    const micBtn = document.getElementById("micBtn");

    let recognition = null;
    let isListening = false;

    // Web Speech API Initialization
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add("listening");
            userInput.placeholder = "Listening...";
        };

        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
        };

        recognition.onerror = (e) => {
            console.error(e);
            stopListeningState();
        };

        recognition.onend = () => {
            stopListeningState();
            if (userInput.value.trim() !== "") {
                sendMessage();
            }
        };
    } else {
        micBtn.style.display = "none";
    }

    function toggleVoiceInput() {
        if (!recognition) return;
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();

        if (!isListening) {
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    function stopListeningState() {
        isListening = false;
        micBtn.classList.remove("listening");
        userInput.placeholder = "Message Mighty AI...";
    }

    function speakOutLoud(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(voice => voice.lang.includes('en-US') && voice.name.includes('Samantha'));
            if (preferredVoice) utterance.voice = preferredVoice;

            window.speechSynthesis.speak(utterance);
        }
    }

    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendMessageRow(query, "You", "user-row");
        userInput.value = "";

        if ('speechSynthesis' in window) window.speechSynthesis.cancel();

        const loader = showTypingIndicator();

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: query })
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            loader.remove();
            
            appendMessageRow(data.text, "Mighty AI", "ai-row");
            speakOutLoud(data.text);

        } catch (error) {
            loader.remove();
            const errText = "Mighty AI service is temporarily unavailable. Please try again later.";
            appendMessageRow(errText, "Mighty AI", "ai-row");
            speakOutLoud(errText);
        }
    }

    function appendMessageRow(text, senderLabel, className) {
        const rowDiv = document.createElement("div");
        rowDiv.className = `message-row ${className}`;
        
        rowDiv.innerHTML = `
            <div class="message-label">${senderLabel}</div>
            <div class="message-content"></div>
        `;
        
        // Escape content safely
        rowDiv.querySelector(".message-content").innerText = text;
        
        chatWindow.appendChild(rowDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTypingIndicator() {
        const rowDiv = document.createElement("div");
        rowDiv.className = "message-row ai-row";
        rowDiv.innerHTML = `
            <div class="message-label">Mighty AI</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        chatWindow.appendChild(rowDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return rowDiv;
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
    }
</script>

</body>
</html>
